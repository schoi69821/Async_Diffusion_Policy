vision_encoder:
  backbone: resnet18
  pretrained: true
  out_dim: 256
  train_last_blocks: 2

crop_encoder:
  out_dim: 128

proprio_encoder:
  in_dim: 35  # 6+6+7+2+7+7
  out_dim: 128

backbone:
  type: temporal_transformer
  d_model: 512
  nhead: 8
  depth: 4
  dropout: 0.1

arm_diffusion_head:
  action_dim: 6
  pred_horizon: 12
  cond_dim: 512
  num_diffusion_steps: 100

phase_head:
  num_phases: 6

gripper_head:
  num_tokens: 3

contact_head:
  output_dim: 1
